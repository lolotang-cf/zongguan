<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>综管综合管理平台</title>
<link rel="stylesheet" href="/css/main.css?v=17">
<script src="/vendor/echarts.min.js"></script>
</head>
<body>
<!-- 登录弹窗 -->
<div class="login-overlay" id="loginOverlay" style="display:none">
  <div class="login-card">
    <div class="login-logo">综管综合管理平台</div>
    <div class="login-subtitle">请登录后使用</div>
    <form id="loginForm" onsubmit="return doLogin(event)">
      <div class="login-row">
        <label>账号</label>
        <input type="text" id="loginUsername" autocomplete="username" placeholder="请输入账号" required>
      </div>
      <div class="login-row">
        <label>密码</label>
        <input type="password" id="loginPassword" autocomplete="current-password" placeholder="请输入密码" required>
      </div>
      <div class="login-err" id="loginErr" style="display:none"></div>
      <button type="submit" class="login-btn" id="loginBtn">登 录</button>
      <div class="login-tip">默认账号：admin / Zg@2026!</div>
    </form>
  </div>
</div>
<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><img src="/logo.png" alt="logo" class="logo-icon" style="width:28px;height:28px;border-radius:50%;object-fit:cover;margin-right:8px;vertical-align:middle;"> 综管综合管理平台</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="topbar">
      <div class="page-title" id="pageTitle">综管驾驶舱</div>
      <div class="topbar-right">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" placeholder="搜索功能、报表、知识库..." id="globalSearch">
        </div>
        <div class="user-info">
          <div class="user-avatar">管</div>
          <span>系统管理员</span>
          <button class="logout-btn" onclick="doLogout()" title="退出登录">退出</button>
        </div>
      </div>
    </header>
    <div class="page-toolbar" id="toolbarArea"></div>
    <main class="content-area" id="contentArea"></main>
  </div>
</div>

<script src="/js/app.js?v=21"></script>
</body>
</html>
