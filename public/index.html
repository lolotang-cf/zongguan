<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>综管AI线上管理平台</title>
<link rel="stylesheet" href="/css/main.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><img src="/logo.png" alt="logo" class="logo-icon" style="width:28px;height:28px;border-radius:50%;object-fit:cover;margin-right:8px;vertical-align:middle;"> 综管综合管理平台</div>
      <div class="logo-sub">综管部门统一管理平台</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="topbar">
      <div class="page-title" id="pageTitle">综管驾驶舱</div>
      <div class="topbar-right">
        <div class="search-box">
          <span>🔍</span>
          <input type="text" placeholder="搜索功能、报表、知识库..." id="globalSearch">
        </div>
        <div class="user-info">
          <div class="user-avatar">管</div>
          <span>系统管理员</span>
        </div>
      </div>
    </header>
    <main class="content-area" id="contentArea"></main>
  </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
